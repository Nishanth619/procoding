<!DOCTYPE html>
<html lang="en">

<head>
    <script src="assets/js/theme-critical.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chatbot - Pro Coding</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --theme-color: #667eea;
            --theme-bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            background: var(--bg-primary);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Container */
        .chat-container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        [data-theme="dark"] .chat-container {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Header */
        .chat-header {
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            z-index: 10;
        }

        [data-theme="dark"] .chat-header {
            background: rgba(255, 255, 255, 0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-3px);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .support-avatar {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .support-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .support-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--dynamic-text-primary);
        }

        .support-status {
            font-size: 13px;
            opacity: 0.8;
            color: var(--dynamic-text-secondary);
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }

        .message {
            position: relative;
            max-width: 75%;
            padding: 12px 18px;
            font-size: 15px;
            line-height: 1.5;
            border-radius: 18px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bot (receiver) â€” dark bubble, white text */
        .message.bot {
            align-self: flex-start;
            background: rgba(20, 20, 35, 0.92);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] .message.bot {
            background: rgba(10, 10, 22, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* User (sender) â€” white bubble, dark text */
        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.96);
            color: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15);
        }

        [data-theme="dark"] .message.user {
            background: rgba(245, 245, 255, 0.95);
            color: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Message time inherits readable contrast per bubble */
        .message.bot .message-time {
            color: rgba(255, 255, 255, 0.45);
        }

        .message.user .message-time {
            color: rgba(26, 26, 46, 0.45);
        }

        /* Remove tails for clean glass look */
        .message::before {
            display: none !important;
        }

        .message-time {
            display: block;
            text-align: right;
            font-size: 10px;
            margin-top: 6px;
            opacity: 0.6;
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        [data-theme="dark"] .chat-input-area {
            background: rgba(0, 0, 0, 0.1);
        }

        .input-pill {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .input-pill {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #user-input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-family: inherit;
            font-size: 16px;
            color: var(--dynamic-text-primary);
            outline: none;
        }

        #user-input::placeholder {
            color: var(--dynamic-text-secondary);
            opacity: 0.6;
        }

        .send-btn {
            width: 52px;
            height: 52px;
            background: var(--theme-color, #667eea);
            border: none;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .send-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
        }

        .send-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
            transform: rotate(-45deg);
            margin-left: 4px;
            margin-bottom: 4px;
        }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        /* 6-TIER LANDSCAPE OPTIMIZATION */
        @media screen and (orientation: landscape) {
            body { 
                overflow: hidden !important; 
                height: 100dvh !important; 
                padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left) !important;
                display: flex !important;
                align-items: flex-start !important;
                justify-content: center !important;
            }

            .chat-container {
                height: 100% !important;
                max-width: 100% !important;
                border-radius: 0 !important;
                border: none !important;
            }

            /* TIER 1-4: Mobile Heights (< 500px) */
            @media (max-height: 499px) {
                .chat-header { height: 44px !important; padding: 0 15px !important; }
                .support-avatar { width: 32px !important; height: 32px !important; border-radius: 9px !important; }
                .support-name { font-size: 14px !important; }
                .back-btn { width: 32px !important; height: 32px !important; border-radius: 8px !important; }
                .back-btn svg { width: 18px !important; height: 18px !important; }
                .support-status { font-size: 10px !important; }
                .status-dot { width: 8px !important; height: 8px !important; }
                
                .chat-messages { padding: 10px 15px !important; gap: 10px !important; }
                .message { font-size: 14px !important; padding: 8px 14px !important; max-width: 85% !important; }
                .chat-input-area { padding: 10px 15px !important; gap: 10px !important; }
                .chat-input { padding: 8px 15px !important; font-size: 14px !important; }
                .send-btn { width: 40px !important; height: 40px !important; }
                .send-btn svg { width: 20px !important; height: 20px !important; }
            }

            /* TIER 1-2: Ultra-Compact (< 374px) */
            @media (max-height: 374px) {
                .chat-messages { gap: 6px !important; }
                .message { font-size: 13px !important; line-height: 1.4 !important; }
            }

            /* TIER 5: Small Tablet (500px - 699px) */
            @media (min-height: 500px) and (max-height: 699px) {
                .chat-header { height: 60px !important; padding: 0 25px !important; }
                .support-avatar { width: 42px !important; height: 42px !important; border-radius: 12px !important; }
                .support-name { font-size: 16px !important; }
                .support-status { font-size: 12px !important; }
                .back-btn { width: 42px !important; height: 42px !important; border-radius: 12px !important; }
                .back-btn svg { width: 22px !important; height: 22px !important; }
                .chat-container { width: 90% !important; max-width: 800px !important; height: 95vh !important; border-radius: 20px !important; border: 1px solid var(--glass-border) !important; }
            }

            /* TIER 6: Large Tablet / Desktop (700px+) */
            @media (min-height: 700px) {
                .chat-header { height: 70px !important; padding: 0 35px !important; }
                .support-avatar { width: 52px !important; height: 52px !important; }
                .support-name { font-size: 20px !important; }
                .support-status { font-size: 14px !important; }
                .back-btn { width: 52px !important; height: 52px !important; border-radius: 15px !important; }
                .back-btn svg { width: 26px !important; height: 26px !important; }
                .chat-container { width: 85% !important; max-width: 900px !important; height: 90vh !important; border-radius: 30px !important; border: 1px solid var(--glass-border) !important; }
            }
        }

        /* ------------------------------------- */
        /* PORTRAIT OPTIMIZATION FOR SMALL DEVICES */
        /* ------------------------------------- */
        @media screen and (max-width: 500px) and (orientation: portrait) {
            .chat-header {
                padding: 12px 18px;
                height: auto;
            }
            .support-avatar {
                width: 38px;
                height: 38px;
                border-radius: 12px;
            }
            .support-name {
                font-size: 16px;
            }
            .support-status {
                font-size: 12px;
            }
            .status-dot {
                width: 10px;
                height: 10px;
            }
            .back-btn {
                width: 38px;
                height: 38px;
                border-radius: 12px;
            }
            .chat-messages {
                padding: 15px 15px 25px !important;
                gap: 12px;
            }
            .message {
                font-size: 14px;
                padding: 10px 15px;
                max-width: 90%;
            }
            .timestamp {
                font-size: 10px;
            }
            .chat-input-area {
                padding: 12px 18px;
                gap: 10px;
            }
            .input-pill {
                padding: 6px 15px;
            }
            #user-input {
                font-size: 16px; /* Must remain 16px to prevent iOS auto-zoom */
                padding: 8px 0;
            }
            .send-btn {
                width: 44px;
                height: 44px;
                border-radius: 14px;
            }
            .send-btn svg {
                width: 22px;
                height: 22px;
            }
        }

        /* Hide dynamically injected theme toggle */
        .theme-toggle {
            display: none !important;
        }
    </style>

    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>

<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <a href="javascript:history.back()" class="back-btn" title="Back">
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>
                </a>
                <div class="support-avatar">
                    <img src="assets/images/logo.png" alt="Support">
                </div>
                <div class="header-info">
                    <span class="support-name">Pro Coding Support</span>
                    <span class="support-status">Usually replies in 1-2 days</span>
                </div>
            </div>
        </header>

        <!-- Messages Area -->
        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                Hello! Thank you for reaching out to Pro Coding. A real person from our team will respond to your message shortly. Please note that our typical response time is 1-2 days. How can we help you today?
                <span class="message-time">10:00 AM</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-pill">
                <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: #8696a0;"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5s.67 1.5 1.5 1.5zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                <input type="text" id="user-input" placeholder="Type a message" onkeypress="if(event.key === 'Enter') sendMessage()">
            </div>
            <button class="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>
            </button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-messages');
            const message = input.value.trim();

            if (message) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // User message
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.innerHTML = `${message}<span class="message-time">${timeStr}</span>`;
                container.appendChild(userMsg);

                input.value = '';
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
    <script src="assets/js/global-theme.js"></script>
    <script src="assets/js/theme.js"></script>
</body>

</html>
