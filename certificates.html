<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script src="assets/js/theme-critical.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Certificates - Pro Coding</title>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --folder-bg: rgba(255, 255, 255, 0.1);
            --folder-border: rgba(255, 255, 255, 0.2);
            --folder-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: var(--bg-primary);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--dynamic-text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--dynamic-nav-border);
            position: relative; /* relative so nav-center-brand absolute positioning works */
            z-index: 1000;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        /* Centered branding */
        .nav-center-brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: var(--dynamic-nav-hover); transform: translateY(-2px); }
        .back-btn svg { width: 24px; height: 24px; fill: var(--dynamic-text-primary); }

        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .branding-icon { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .branding-text { font-size: 20px; font-weight: 700; color: var(--dynamic-text-primary); }

        /* Gallery Content */
        .gallery-container {
            padding: 20px 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-title svg {
            width: 32px; height: 32px; fill: var(--cert-gold, #f59e0b); filter: drop-shadow(0 2px 4px rgba(245,158,11,0.4));
        }

        /* Fixed 4-Column Grid */
        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .screenshot-card {
            background: var(--folder-bg);
            border: 1px solid var(--folder-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: var(--folder-shadow);
            cursor: pointer;
        }
        .screenshot-card:hover { transform: translateY(-5px); border-color: rgba(245,158,11,0.4); box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15); }

        .screenshot-thumb-cert {
            width: 100%;
            aspect-ratio: 1.414 / 1; /* A4 aspect ratio */
            background: linear-gradient(145deg, #0d0820, #14112a, #1a1040);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .cert-wireframe {
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 4px;
        }

        .cert-mock-seal {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, rgba(245,158,11,0.25), rgba(245,158,11,0.05));
            border: 1px solid rgba(245,158,11,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cert-mock-seal svg { width: 14px; height: 14px; fill: rgba(245,158,11,0.85); }
        
        .cert-mock-text {
            width: 60%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: absolute;
            top: 40%;
        }
        .cert-mock-title {
            width: 80%;
            height: 8px;
            background: rgba(245,158,11,0.3);
            border-radius: 4px;
            position: absolute;
            top: 55%;
        }

        .screenshot-info { padding: 15px 18px 18px; }
        .screenshot-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .screenshot-meta {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            font-weight: 500;
        }
        .screenshot-status {
            font-size: 11px;
            font-weight: 800;
            color: var(--cert-gold, #f59e0b);
            background: rgba(245, 158, 11, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .screenshot-status svg { width: 12px; height: 12px; fill: currentColor; }

        /* Comprehensive 6-Tier Landscape System */
        @media screen and (orientation: landscape) {
            html, body {
                overflow-x: hidden !important; 
                overflow-y: hidden !important; 
                height: 100vh !important;
                width: 100vw !important;
                max-width: 100vw !important;
                position: fixed !important;
            }

            .landscape-scroller {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100vw !important; 
                max-width: 100vw !important;
                height: 100vh !important;
                overflow-y: auto !important; 
                overflow-x: hidden !important; 
                -webkit-overflow-scrolling: touch;
                display: block !important;
                z-index: 1000 !important;
                background: var(--bg-primary) !important;
            }

            .top-nav {
                height: 44px !important;
                padding: 0 15px !important;
                display: flex !important;
                align-items: center !important;
                background: var(--dynamic-nav-bg) !important;
                backdrop-filter: blur(15px) !important;
                border-bottom: 1px solid var(--dynamic-nav-border) !important;
                position: sticky !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                z-index: 1001 !important;
                overflow: hidden !important;
                white-space: nowrap !important;
            }
            .top-nav::-webkit-scrollbar { display: none !important; }

            .nav-left { flex-shrink: 0 !important; display: flex !important; align-items: center !important; gap: 8px !important; }
            .branding-icon { width: 30px !important; height: 30px !important; }
            .branding-text { font-size: 13px !important; display: block !important; white-space: nowrap !important; color: white !important; }

            .back-btn { width: 32px !important; height: 32px !important; border-radius: 8px !important; }
            .back-btn svg { width: 18px !important; height: 18px !important; }

            @media (max-width: 580px) {
                .branding-text { display: none !important; }
            }

            .gallery-container {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                display: block !important;
                padding: 15px 15px 40px !important;
                overflow: visible !important; 
                margin: 0 !important;
            }

            .page-title {
                font-size: 18px !important;
                margin-bottom: 15px !important;
                display: flex !important;
            }
            .page-title svg { height: 18px !important; width: 18px !important; }

            .screenshots-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 12px !important;
                width: 100% !important;
                max-width: 100% !important;
                height: auto !important;
                margin: 0 !important;
            }

            .screenshot-card {
                width: 100% !important;
                min-height: auto !important;
                background: var(--folder-bg) !important;
                border: 1px solid var(--folder-border) !important;
                border-radius: 12px !important;
                overflow: hidden !important;
                display: flex !important;
                flex-direction: column !important;
            }

            .screenshot-thumb-cert { aspect-ratio: 1.414/1 !important; }
            .cert-mock-seal { bottom: 8px !important; right: 8px !important; width: 22px !important; height: 22px !important; }
            .cert-mock-seal svg { width: 10px !important; height: 10px !important; }
            .cert-wireframe { inset: 6px !important; }
            .screenshot-info { padding: 8px 10px !important; }
            .screenshot-title { font-size: 11px !important; margin-bottom: 2px !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .screenshot-meta { font-size: 8px !important; margin-bottom: 6px !important; gap: 6px !important; opacity: 0.6; }
            .screenshot-status { padding: 2px 5px !important; font-size: 7px !important; border-radius: 4px !important; }
            .screenshot-status svg { width: 8px !important; height: 8px !important; }

            /* TIER 1: Ultra-compact (<320px) */
            @media (max-height: 319px) {
                .gallery-container { padding: 10px 10px 30px !important; }
                .screenshots-grid { gap: 8px !important; grid-template-columns: repeat(3, 1fr) !important; }
                .screenshot-card { border-radius: 10px !important; }
                .screenshot-info { padding: 6px 8px !important; }
                .screenshot-status { display: none !important;}
            }

            /* TIER 2: Compact (320-374px) */
            @media (min-height: 320px) and (max-height: 374px) {
                .gallery-container { padding: 12px 14px 40px !important; }
                .screenshots-grid { gap: 12px !important; grid-template-columns: repeat(3, 1fr) !important; }
                .screenshot-card { border-radius: 10px !important; }
                .screenshot-info { padding: 6px 10px !important; }
                .screenshot-status { display: none !important; }
            }

            /* TIER 3: Standard (375-449px) */
            @media (min-height: 375px) and (max-height: 449px) {
                .gallery-container { padding: 15px 18px 40px !important; }
                .screenshots-grid { gap: 15px !important; grid-template-columns: repeat(3, 1fr) !important; }
                .screenshot-card { border-radius: 12px !important; }
                .screenshot-info { padding: 8px 12px !important; }
                .screenshot-title { font-size: 12px !important; }
                .screenshot-meta { font-size: 9px !important; }
                .screenshot-status { font-size: 8px !important; padding: 3px 6px !important; }
                .page-title { font-size: 16px !important; }
                .page-title svg { width: 16px !important; height: 16px !important; }
                .back-btn { width: 34px !important; height: 34px !important; }
            }

            /* TIER 4: Large Mobile (450-499px) */
            @media (min-height: 450px) and (max-height: 499px) {
                .gallery-container { padding: 20px 22px 50px !important; }
                .screenshots-grid { gap: 18px !important; grid-template-columns: repeat(4, 1fr) !important; }
                .screenshot-info { padding: 10px 14px !important; }
                .screenshot-title { font-size: 13px !important; margin-bottom: 4px !important; }
                .screenshot-meta { font-size: 10px !important; margin-bottom: 8px !important; }
                .screenshot-status { font-size: 9px !important; padding: 3px 7px !important; }
                .screenshot-status svg { width: 10px !important; height: 10px !important; }
                .page-title { font-size: 18px !important; margin-bottom: 16px !important; }
                .page-title svg { width: 18px !important; height: 18px !important; }
                .back-btn { width: 36px !important; height: 36px !important; }
            }

            /* TIER 5: Small-Tablet / Laptop (500-699px) */
            @media (min-height: 500px) and (max-height: 699px) {
                .top-nav { height: 62px !important; padding: 0 40px !important; }
                .branding-icon { width: 44px !important; height: 44px !important; }
                .branding-text { font-size: 18px !important; }
                .back-btn { width: 40px !important; height: 40px !important; }
                .back-btn svg { width: 20px !important; height: 20px !important; }
                .gallery-container { padding: 30px 50px 70px !important; }
                .screenshots-grid { gap: 22px !important; grid-template-columns: repeat(4, 1fr) !important; }
                .screenshot-info { padding: 12px 16px !important; }
                .screenshot-title { font-size: 14px !important; margin-bottom: 5px !important; }
                .screenshot-meta { font-size: 11px !important; margin-bottom: 10px !important; }
                .screenshot-status { font-size: 10px !important; padding: 4px 8px !important; }
                .screenshot-status svg { width: 11px !important; height: 11px !important; }
                .page-title { font-size: 22px !important; margin-bottom: 22px !important; }
                .page-title svg { width: 22px !important; height: 22px !important; }
            }

            /* TIER 6: Desktop / Large Screen (700px+) */
            @media (min-height: 700px) {
                .top-nav { height: 75px !important; padding: 0 70px !important; }
                .branding-icon { width: 54px !important; height: 54px !important; }
                .branding-text { font-size: 24px !important; }
                .back-btn { width: 48px !important; height: 48px !important; }
                .back-btn svg { width: 24px !important; height: 24px !important; }
                .gallery-container { padding: 40px 70px 90px !important; }
                .screenshots-grid { gap: 30px !important; grid-template-columns: repeat(4, 1fr) !important; }
                .screenshot-info { padding: 16px 22px !important; }
                .screenshot-title { font-size: 18px !important; margin-bottom: 8px !important; }
                .screenshot-meta { font-size: 14px !important; margin-bottom: 14px !important; }
                .screenshot-status { font-size: 12px !important; padding: 6px 11px !important; }
                .screenshot-status svg { width: 14px !important; height: 14px !important; }
                .page-title { font-size: 32px !important; margin-bottom: 30px !important; }
                .page-title svg { width: 32px !important; height: 32px !important; }
            }

            .landscape-scroller::-webkit-scrollbar { width: 6px; }
            .landscape-scroller::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
            .landscape-scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        }

        /* Hide the injected theme toggle on this page */
        .theme-toggle, .theme-fab { display: none !important; }
    </style>

    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <div class="landscape-scroller">
        <nav class="top-nav">
            <div class="nav-left">
                <a href="javascript:history.back()" class="back-btn" title="Back">
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </a>
            </div>
            <div class="nav-center-brand">
                <div class="branding-icon">
                    <img src="assets/images/logo.png" alt="Logo">
                </div>
                <span class="branding-text">Pro coding</span>
            </div>
            <div class="nav-right"></div>
        </nav>

        <div class="gallery-container">
            <h1 class="page-title">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                My Certificates
            </h1>
            <div class="screenshots-grid" id="main-gallery">
                <!-- Populated via JS -->
            </div>
        </div>
    </div>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/global-theme.js"></script>
    <script>
        const courses = ["Web Development", "Python Masterclass", "Unity 3D Game Dev", "Data Science Bootcamp", "React Frontend", "Node.js Backend", "Flutter Apps", "UI/UX Design"];

        function loadGallery() {
            const grid = document.getElementById('main-gallery');
            const now = new Date();

            grid.innerHTML = Array.from({length: courses.length}).map((_, i) => {
                const date = new Date(now);
                date.setDate(now.getDate() - (i*15)); // Certificates spaced 15 days apart
                const dateStr = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const courseName = courses[i];

                return `
                <div class="screenshot-card" onclick="window.location.href='certificate-display.html'">
                    <div class="screenshot-thumb-cert">
                        <div class="cert-wireframe"></div>
                        <div class="cert-mock-text"></div>
                        <div class="cert-mock-title"></div>
                        <div class="cert-mock-seal">
                            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                        </div>
                    </div>
                    <div class="screenshot-info">
                        <div class="screenshot-title">${courseName}</div>
                        <div class="screenshot-meta">
                            <span>Issued: ${dateStr}</span>
                        </div>
                        <div class="screenshot-status">
                            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                            Verified
                        </div>
                    </div>
                </div>
            `;}).join('');
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
