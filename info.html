<!DOCTYPE html>
<html lang="en">

<head>
    <script src="assets/js/theme-critical.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Information - Pro Coding</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/theme.css">
    <style>
        :root {
            /* Default Theme */
            --theme-color: #667eea;
            --theme-bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);

            /* Dynamic Contrast Variables */
            --dynamic-text-primary: #ffffff;
            --dynamic-text-secondary: rgba(255, 255, 255, 0.85);
            --dynamic-icon-fill: #ffffff;
            --dynamic-nav-bg: rgba(255, 255, 255, 0.15);
            --dynamic-nav-border: rgba(255, 255, 255, 0.2);
            --dynamic-nav-hover: rgba(255, 255, 255, 0.25);
            --dynamic-search-bg: rgba(255, 255, 255, 0.15);
            --dynamic-search-border: rgba(255, 255, 255, 0.2);
            --dynamic-btn-text: #ffffff;
            --dynamic-btn-border: transparent;
            --dynamic-btn-glow: none;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            background: var(--bg-primary);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 25px 30px 15px;
            background: transparent;
            position: relative;
        }

        /* Centered branding */
        .nav-center-brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: var(--dynamic-text-primary);
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            background: var(--dynamic-nav-hover);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .branding-text {
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .branding-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .branding-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }


        /* Info Container */
        .info-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .info-container {
            width: 100%;
            max-width: 600px;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .screen-title {
            color: var(--dynamic-text-primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .section-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            color: var(--dynamic-text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 16px;
            border: 1px solid var(--dynamic-search-border);
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .item-heading {
            color: var(--dynamic-text-primary);
            font-weight: 600;
            font-size: 18px;
        }

        .action-btn {
            width: 100%;
            padding: 14px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .contact-card {
            padding: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            border: 1px solid var(--dynamic-nav-border);
            text-align: center;
        }

        .contact-email {
            display: block;
            margin-top: 10px;
            color: var(--dynamic-text-primary);
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            word-break: break-all;
        }

        .contact-email:hover {
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            color: var(--dynamic-text-secondary);
            font-size: 12px;
        }

        /* ===== INFO PAGE RESPONSIVE ===== */
        /* Mobile-first. Always vertically scrollable. */

        @media (max-width: 480px) {
            .top-nav {
                padding: 12px 16px 8px;
            }
            .branding-icon {
                width: 36px;
                height: 36px;
            }
            .info-wrapper {
                padding: 20px 14px;
            }
            .info-container {
                padding: 20px 16px;
                gap: 20px;
                border-radius: 18px;
            }
            .screen-title {
                font-size: 22px;
            }
            .item-heading {
                font-size: 16px;
            }
        }

        /* Comprehensive 6-Tier Landscape Optimization for Info Page */
        @media screen and (orientation: landscape) {
            /* Fix body to prevent it from clipping the horizontal scrolling content */
            html, body {
                overflow: hidden !important;
                height: 100dvh !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }
            
            .top-nav {
                height: 48px !important;
                padding: 0 20px !important;
                display: flex !important;
                align-items: center !important;
                background: var(--dynamic-nav-bg) !important;
                backdrop-filter: blur(10px) !important;
                border-bottom: 1px solid var(--dynamic-nav-border) !important;
            }
            .branding { display: flex !important; align-items: center !important; gap: 8px !important; }
            .branding-icon { width: 32px !important; height: 32px !important; }
            .branding-text { font-size: 14px !important; display: block !important; white-space: nowrap !important; }

            /* position:fixed - bypasses ALL parent overflow:hidden - bulletproof scroll fix */
            .info-wrapper {
                position: fixed !important;
                top: 48px !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                display: flex !important;
                flex-direction: row !important;
                justify-content: flex-start !important;
                padding: 0 !important;
                overflow-x: auto !important;
                overflow-y: hidden !important;
                scrollbar-width: none;
                -ms-overflow-style: none;
                align-items: stretch !important;
            }
            .info-wrapper::-webkit-scrollbar { display: none; }

            .info-container {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                justify-content: flex-start !important;
                align-items: center !important; /* Center cards vertically inside the container */
                padding: 20px 40px !important;
                gap: 30px !important;
                width: max-content !important;
                max-width: none !important;
                margin: 0 !important; /* CRITICAL: Override portrait margin: 0 auto to prevent left-side clipping */
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }

            /* Center horizontally on very wide screens */
            @media (min-width: 1300px) {
                .info-container { margin: 0 auto !important; }
            }

            .info-card {
                background: var(--dynamic-nav-bg);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid var(--dynamic-nav-border);
                border-radius: 20px;
                display: flex !important;
                flex-direction: column !important;
                flex-shrink: 0 !important;
                justify-content: flex-start;
                padding: 25px !important;
                gap: 12px !important; /* Space between sections inside the card */
                width: 340px !important;
                overflow: hidden !important; /* Clip content that exceeds card size */
            }

            .main-branding-card {
                justify-content: center !important;
                align-items: center !important;
                text-align: center !important;
                background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08)) !important;
                border: 1px solid rgba(255,255,255,0.3) !important;
                box-shadow: 0 8px 32px rgba(0,0,0,0.1) !important;
            }

            .screen-title { margin: 0 !important; color: var(--dynamic-text-primary); font-weight: 700; width: 100% !important; }
            .section-title { font-size: 11px !important; margin-bottom: 5px !important; opacity: 0.8; }
            .info-item, .contact-card { background: rgba(0,0,0,0.05); border-radius: 12px; width: 100%; transition: none !important; padding: 12px !important; gap: 8px !important; display: flex !important; flex-direction: column !important; }
            .action-btn { width: 100%; font-weight: 600; }
            .item-heading { font-size: 14px !important; font-weight: 500; }

            /* TIER 1: Ultra-Compact (< 344px) */
            @media (max-height: 344px) {
                .info-card { width: 230px !important; min-height: 185px !important; padding: 12px !important; gap: 6px !important; }
                .screen-title { font-size: 14px !important; }
                .item-heading { font-size: 11px !important; }
                .action-btn { padding: 5px !important; font-size: 10px !important; }
                .info-item, .contact-card { padding: 8px !important; gap: 4px !important; }
                .section-title { font-size: 9px !important; }
            }

            /* TIER 2: Compact-Mobile (345px-374px) */
            @media (min-height: 345px) and (max-height: 374px) {
                .info-card { width: 275px !important; min-height: 230px !important; padding: 14px !important; gap: 8px !important; }
                .screen-title { font-size: 16px !important; }
                .info-item, .contact-card { padding: 10px !important; }
            }

            /* TIER 3: Standard-Mobile (375px-399px) */
            @media (min-height: 375px) and (max-height: 399px) {
                .info-card { width: 300px !important; min-height: 250px !important; padding: 18px !important; gap: 10px !important; }
                .screen-title { font-size: 20px !important; }
            }

            /* TIER 4: Large-Mobile (400px-499px) */
            @media (min-height: 400px) and (max-height: 499px) {
                .info-card { width: 330px !important; min-height: 280px !important; padding: 20px !important; gap: 14px !important; }
                .screen-title { font-size: 22px !important; }
            }

            /* TIER 5: Small-Tablet (500-699px) */
            @media (min-height: 500px) and (max-height: 699px) {
                .top-nav { height: 60px !important; padding: 15px 20px 10px !important; }
                .branding-icon { width: 42px !important; height: 42px !important; }
                .branding-text { font-size: 16px !important; }
                .info-wrapper { top: 60px !important; }
                .info-card { width: 360px !important; min-height: 350px !important; padding: 28px !important; gap: 18px !important; }
                .screen-title { font-size: 26px !important; }
                .action-btn { padding: 12px !important; font-size: 14px !important; }
                .contact-email { font-size: 16px !important; }
                .item-heading { font-size: 15px !important; }
                .section-title { font-size: 12px !important; }
            }

            /* TIER 6: Desktop / Large Tablet (700px+) */
            @media (min-height: 700px) {
                .top-nav { height: 70px !important; padding: 20px 25px 12px !important; }
                .branding-icon { width: 52px !important; height: 52px !important; }
                .branding-text { font-size: 22px !important; }
                .info-wrapper { top: 70px !important; }
                .info-card { width: 440px !important; min-height: 420px !important; padding: 35px !important; gap: 25px !important; }
                .screen-title { font-size: 32px !important; }
                .action-btn { padding: 15px !important; font-size: 16px !important; }
                .contact-email { font-size: 18px !important; }
                .item-heading { font-size: 16px !important; }
                .section-title { font-size: 13px !important; }
            }

            /* Utilities */
            .info-wrapper::-webkit-scrollbar { height: 6px; }
            .info-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; margin: 0 40px; }
            .info-wrapper::-webkit-scrollbar-thumb { background: var(--dynamic-nav-border); border-radius: 10px; }
        }

        /* Portrait override (Optional: ensures consistency if page is loaded in portrait on high-res) */
        @media (min-width: 900px) and (orientation: portrait) {
            .info-container { max-width: 800px !important; padding: 60px !important; }
            .info-card { width: 100% !important; margin-bottom: 30px; }
        }

        /* Hide injected elements from global theme script if any */
        #top-nav-night-mode, 
        .theme-fab,
        .theme-toggle {
            display: none !important;
        }
    </style>

    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>

<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="javascript:history.back()" class="back-btn" title="Back">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
        </div>
        <div class="nav-center-brand">
            <div class="branding-icon">
                <img src="assets/images/logo.png" alt="Logo">
            </div>
            <span class="branding-text">Pro coding</span>
        </div>
        <div class="nav-right"></div>
    </nav>

    <!-- Info Container -->
    <div class="info-wrapper">
        <div class="info-container">
            
            <!-- Column 1: Header & Legal -->
            <div class="info-card main-branding-card">
                <h2 class="screen-title">About Pro Coding</h2>
                <!-- Legal Section -->
                <div class="section-group" style="width: 100%;">
                    <h4 class="section-title">Legal & Terms</h4>
                    <div class="info-item">
                        <div class="item-heading">Privacy Policy</div>
                        <button class="action-btn">
                            <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: currentColor;" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                            </svg>
                            View Privacy
                        </button>
                    </div>
                </div>
            </div>

            <!-- Column 2: Links -->
            <div class="info-card">
                <!-- Links Section -->
                <div class="section-group">
                    <h4 class="section-title">Official Links</h4>
                    <div class="info-item">
                        <div class="item-heading">Our Website</div>
                        <button class="action-btn">
                            Visit Website
                        </button>
                    </div>
                    <div class="info-item">
                        <div class="item-heading">More Apps</div>
                        <button class="action-btn">
                            Discover More
                        </button>
                    </div>
                </div>
            </div>

            <!-- Column 3: Community & Footer -->
            <div class="info-card">
                <!-- Community Section -->
                <div class="section-group">
                    <h4 class="section-title">Support</h4>
                    <div class="info-item">
                        <button class="action-btn">
                            Rate Now
                        </button>
                    </div>
                    
                    <div class="contact-card" style="margin-top: 5px; padding: 15px !important;">
                        <p style="color: var(--dynamic-text-secondary); font-size: 11px; margin-bottom: 8px;">For any support, feedback or issues, please reach out to us at:</p>
                        <a href="mailto:support@procoding.school" class="contact-email" style="font-size: 14px; color: var(--dynamic-text-primary); font-weight: 700;">support@procoding.school</a>
                    </div>
                </div>

                <div class="footer-note" style="margin-top: auto; font-size: 10px; opacity: 0.7;">
                    Version 4.1.0
                </div>
            </div>
        </div>
    </div>

    <script>
        const root = document.documentElement;

        function initInfo() {
            // Apply current theme settings
            const savedTheme = localStorage.getItem('themeSettings');
            if (savedTheme) {
                try {
                    const theme = JSON.parse(savedTheme);
                    if (theme.start && theme.end) {
                        updateTheme(theme.start, theme.end);
                    }
                } catch (e) {
                    console.log('Error parsing theme settings');
                }
            } else {
                const currentStart = getComputedStyle(root).getPropertyValue('--theme-color').trim();
                const currentEnd = '#764ba2'; // Default end color
                updateTheme(currentStart, currentEnd);
            }
        }

        function updateTheme(start, end) {
            root.style.setProperty('--theme-color', start);
            root.style.setProperty('--theme-bg-gradient', `linear-gradient(135deg, ${start} 0%, ${end} 100%)`);
            updateDynamicContrast(start, end);
        }

        function updateDynamicContrast(c1, c2) {
            function getBrightness(hex) {
                if (!hex || hex[0] !== '#') return 0;
                const r = parseInt(hex.substring(1, 3), 16);
                const g = parseInt(hex.substring(3, 5), 16);
                const b = parseInt(hex.substring(5, 7), 16);
                return (r * 299 + g * 587 + b * 114) / 1000;
            }

            const b1 = getBrightness(c1);
            const b2 = getBrightness(c2);
            const avgBrightness = (b1 + b2) / 2;

            const isDarkMode = document.documentElement.getAttribute('data-theme') === 'dark';
            const isEffectiveDark = isDarkMode || avgBrightness < 120;
            const isLightBg = !isEffectiveDark && avgBrightness > 170;

            if (isLightBg) {
                root.style.setProperty('--dynamic-text-primary', '#333333');
                root.style.setProperty('--dynamic-text-secondary', 'rgba(0, 0, 0, 0.7)');
                root.style.setProperty('--dynamic-nav-bg', 'rgba(0, 0, 0, 0.08)');
                root.style.setProperty('--dynamic-nav-border', 'rgba(0, 0, 0, 0.12)');
                root.style.setProperty('--dynamic-nav-hover', 'rgba(0, 0, 0, 0.15)');
                root.style.setProperty('--dynamic-search-border', 'rgba(0, 0, 0, 0.1)');
            } else {
                root.style.setProperty('--dynamic-text-primary', '#ffffff');
                root.style.setProperty('--dynamic-text-secondary', 'rgba(255, 255, 255, 0.85)');
                root.style.setProperty('--dynamic-nav-bg', 'rgba(255, 255, 255, 0.15)');
                root.style.setProperty('--dynamic-nav-border', 'rgba(255, 255, 255, 0.2)');
                root.style.setProperty('--dynamic-nav-hover', 'rgba(255, 255, 255, 0.25)');
                root.style.setProperty('--dynamic-search-border', 'rgba(255, 255, 255, 0.2)');
            }
        }

        window.addEventListener('load', initInfo);

        // Sync with global theme changes
        const themeObserver = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'data-theme') {
                    initInfo();
                }
            });
        });
        themeObserver.observe(document.documentElement, { attributes: true });
    </script>
    <script src="assets/js/theme.js"></script>
</body>

</html>
