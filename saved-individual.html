<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script src="assets/js/theme-critical.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Individual Progress - Pro Coding</title>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --referral-green: var(--theme-color);
            --referral-red: #ef4444;
            --cyan-border: var(--theme-color);
            --card-item-bg: rgba(255, 255, 255, 0.1);
            --roadmap-purple: var(--theme-color);
            --folder-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            background: var(--bg-primary);
            color: var(--dynamic-text-primary);
        }

        /* Top Navigation */
        .top-nav {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            z-index: 1000;
            position: sticky;
            top: 0;
        }

        /* Centered branding */
        .nav-center-brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            background: var(--dynamic-nav-bg);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--dynamic-text-primary);
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--dynamic-nav-hover);
            transform: translateX(-3px);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .branding-icon {
            width: 38px;
            height: 38px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .branding-icon img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .branding-text {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-icon {
            width: 38px;
            height: 38px;
            background: var(--dynamic-nav-bg);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--dynamic-text-primary);
        }

        .nav-icon:hover {
            background: var(--dynamic-nav-hover);
        }

        .nav-icon svg {
            width: 18px;
            height: 18px;
        }

        /* Main Content Container */
        .content-area {
            padding: 15px;
            position: relative;
        }

        .page-header {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--dynamic-text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--roadmap-purple);
            border-radius: 2px;
            box-shadow: 0 0 10px var(--roadmap-purple);
        }

        /* 4-Column Grid */
        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-bottom: 30px;
        }

        .screenshot-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: var(--folder-shadow);
        }

        .screenshot-card:hover {
            border-color: var(--roadmap-purple);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .screenshot-image-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            flex-shrink: 0;
        }

        .screenshot-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .screenshot-info {
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .screenshot-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--dynamic-text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .screenshot-desc {
            font-size: 9px;
            color: var(--dynamic-text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }


        /* ===== 6-TIER VERTICAL LANDSCAPE SYSTEM ===== */
        @media screen and (orientation: landscape) {
            
            /* Unified Responsive Navigation */
            .top-nav { display: flex !important; align-items: center !important; }
            
            /* TIER 1-4: Mobile Heights (< 500px) */
            @media (max-height: 499px) {
                .top-nav { height: 44px !important; padding: 0 15px !important; }
                .branding-icon { width: 32px !important; height: 32px !important; }
                .branding-text { font-size: 14px !important; }
                .nav-icon, .back-btn { width: 30px !important; height: 30px !important; border-radius: 8px !important; }
                .nav-icon svg, .back-btn svg { width: 16px !important; height: 16px !important; }
                .content-area { padding: 10px 15px !important; }
                .page-header { margin-bottom: 12px !important; }
                .page-title { font-size: 16px !important; }
                .page-title::before { height: 18px !important; width: 3px !important; }
            }

            /* TIER 1: Ultra-Compact (< 344px) */
            @media (max-height: 344px) {
                .screenshots-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
                .screenshot-info { padding: 5px 8px !important; }
                .screenshot-title { font-size: 9px !important; }
            }

            /* TIER 2-3: Compact/Standard Mobile (345px - 399px) */
            @media (min-height: 345px) and (max-height: 399px) {
                .screenshots-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 10px !important; }
            }

            /* TIER 4: Large Mobile (400px - 499px) */
            @media (min-height: 400px) and (max-height: 499px) {
                .screenshots-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 15px !important; }
                .screenshot-title { font-size: 12px !important; }
            }

            /* TIER 5: Small Tablet (500px - 699px) */
            @media (min-height: 500px) and (max-height: 699px) {
                .top-nav { height: 60px !important; padding: 0 25px !important; }
                .branding-icon { width: 42px !important; height: 42px !important; }
                .branding-text { font-size: 18px !important; }
                .nav-icon, .back-btn { width: 42px !important; height: 42px !important; border-radius: 12px !important; }
                .nav-icon svg, .back-btn svg { width: 22px !important; height: 22px !important; }
                .content-area { padding: 20px 30px !important; }
                .page-title { font-size: 24px !important; }
                .screenshots-grid { grid-template-columns: repeat(5, 1fr) !important; gap: 20px !important; }
                .screenshot-title { font-size: 14px !important; }
                .screenshot-desc { font-size: 11px !important; }
            }

            /* TIER 6: Large Tablet / Desktop (700px+) */
            @media (min-height: 700px) {
                .top-nav { height: 70px !important; padding: 0 35px !important; }
                .branding-icon { width: 52px !important; height: 52px !important; }
                .branding-text { font-size: 22px !important; }
                .nav-icon, .back-btn { width: 52px !important; height: 52px !important; border-radius: 15px !important; }
                .nav-icon svg, .back-btn svg { width: 26px !important; height: 26px !important; }
                .content-area { padding: 35px 50px !important; }
                .page-title { font-size: 30px !important; }
                .screenshots-grid { grid-template-columns: repeat(6, 1fr) !important; gap: 25px !important; }
                .screenshot-title { font-size: 16px !important; }
                .screenshot-desc { font-size: 13px !important; }
                .screenshot-card { border-radius: 18px !important; }
            }
        }

    </style>

    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="javascript:history.back()" class="back-btn" title="Back">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
        </div>
        <div class="nav-center-brand">
            <div class="branding-icon">
                <img src="assets/images/logo.png" alt="Logo">
            </div>
            <span class="branding-text">Pro coding</span>
        </div>

        <div class="nav-icons">
            <div class="nav-icon" title="Dashboard" onclick="window.location.href='index.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </div>
            <div class="nav-icon" title="Settings" onclick="window.location.href='settings.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </div>
        </div>
    </nav>

    <!-- Content Area -->
    <div class="content-area">
        <div class="page-header">
            <h1 class="page-title">Web Dev Saved</h1>
        </div>

        <div class="screenshots-grid" id="individual-grid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <script src="assets/js/global-theme.js"></script>
    <script>

            { 
                id: 1,

        function loadGrid() {
            const grid = document.getElementById('individual-grid');
            grid.innerHTML = screenshots.map(shot => `
                <div class="screenshot-card">
                    <div class="screenshot-image-wrap">
                        <img src="${shot.img}" alt="${shot.title}" class="screenshot-image">

                    <div class="screenshot-info">

                        <div class="screenshot-desc">${shot.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        window.addEventListener('DOMContentLoaded', loadGrid);
    </script>
</body>
</html>
