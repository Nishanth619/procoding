<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <script src="assets/js/theme-critical.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Refer &amp; Earn - Pro Coding</title>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --referral-green: #22c55e;
            --referral-red: #ef4444;
            --cyan-border: #06b6d4;

            /* Dynamic Contrast Variables — fall back to standard theme vars */
            --dynamic-text-primary: var(--text-primary);
            --dynamic-text-secondary: var(--text-secondary);
            --dynamic-nav-bg: var(--nav-icon-bg);
            --dynamic-nav-border: var(--nav-icon-border);
            --dynamic-nav-hover: var(--nav-icon-hover);
        }

        /* Dark mode: ensure correct card backgrounds */
        [data-theme="dark"] .stat-card {
            background: var(--card-bg);
            border-color: var(--card-border);
        }

        [data-theme="dark"] .item-card {
            background: var(--card-bg);
            border-color: var(--card-border);
        }

        [data-theme="dark"] .content-box {
            background: rgba(6, 182, 212, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            background: var(--bg-primary);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--dynamic-text-primary);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ─── TOP NAV ─── */
        .top-nav {
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--dynamic-nav-border);
            flex-shrink: 0;
            position: relative;
        }

        /* Centered branding */
        .nav-center-brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .nav-left {
            display: flex !important;
            align-items: center !important;
            gap: 12px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            background: var(--dynamic-nav-bg);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--dynamic-nav-hover);
            transform: translateX(-2px);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--dynamic-text-primary);
        }

        .branding {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .branding-icon {
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            overflow: hidden;
        }

        .branding-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .branding-text {
            font-size: 17px;
            font-weight: 700;
        }

        /* ─── PAGE BODY ─── */
        .page-body {
            flex: 1;
            display: flex;
            gap: 12px;
            padding: 12px 18px;
            overflow: hidden;
            min-height: 0;
        }

        /* ─── LEFT PANEL ─── */
        .left-panel {
            width: 240px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 14px;
        }

        .subheader-msg {
            font-size: 12px;
            font-weight: 500;
            color: var(--dynamic-text-secondary);
            line-height: 1.5;
        }

        .stats-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: var(--card-bg, rgba(255, 255, 255, 0.06));
            border: 1px solid var(--card-border, rgba(255, 255, 255, 0.1));
            border-radius: 16px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .green-card:hover {
            border-color: rgba(74, 222, 128, 0.4);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.15);
        }

        .red-card:hover {
            border-color: rgba(248, 113, 113, 0.4);
            box-shadow: 0 6px 20px rgba(248, 113, 113, 0.15);
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .green-card .stat-icon {
            background: rgba(74, 222, 128, 0.15);
        }

        .green-card .stat-icon svg {
            fill: #4ade80;
            width: 22px;
            height: 22px;
        }

        .red-card .stat-icon {
            background: rgba(248, 113, 113, 0.15);
        }

        .red-card .stat-icon svg {
            fill: #f87171;
            width: 22px;
            height: 22px;
        }

        .stat-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--dynamic-text-secondary);
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
            color: var(--dynamic-text-primary);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .text-green {
            color: var(--referral-green);
        }

        .text-red {
            color: var(--referral-red);
        }

        .refresh-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: fit-content;
            gap: 5px;
        }

        .refresh-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2.5px solid var(--dynamic-nav-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.4s ease, border-color 0.2s ease;
            background: var(--dynamic-nav-bg);
        }

        .refresh-circle:hover {
            border-color: var(--dynamic-nav-hover);
            transform: rotate(180deg);
        }

        .refresh-circle svg {
            width: 28px;
            height: 28px;
            fill: var(--dynamic-text-secondary);
        }

        .refresh-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--dynamic-text-secondary);
        }

        /* ─── RIGHT PANEL ─── */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
            overflow: hidden;
        }

        .tabs-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 0;
            background: var(--dynamic-nav-bg);
            border: 1.5px solid var(--dynamic-nav-border);
            border-radius: 50px;
            color: var(--dynamic-text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }

        .tab-btn.active {
            border-color: var(--cyan-border);
            color: var(--dynamic-text-primary);
            background: rgba(6, 182, 212, 0.1);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.25);
        }

        .tab-btn:hover:not(.active) {
            background: var(--dynamic-nav-hover);
            color: var(--dynamic-text-primary);
        }

        .content-box {
            flex: 1;
            border: 2px solid var(--cyan-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(6, 182, 212, 0.03);
            min-height: 0;
        }

        .content-box-header {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            padding: 10px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            color: var(--dynamic-text-primary);
            flex-shrink: 0;
        }

        .items-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            align-content: start;
            gap: 10px;
            padding: 12px;
            overflow-y: auto;
            scrollbar-width: none;
            min-height: 0;
        }

        .items-grid::-webkit-scrollbar {
            display: none;
        }

        .item-card {
            background: var(--dynamic-nav-bg);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 12px;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: auto;
            /* FIX: Allow card to breathe */
            min-height: 100px;
            /* Maintain minimum structure */
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            overflow: hidden;
            /* Prevent any spillage */
        }

        .item-card:hover {
            transform: translateY(-2px);
            border-color: var(--cyan-border);
        }

        .item-icon {
            width: 34px;
            height: 34px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* Icon letter placeholder (when no image) */
        .item-icon-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: var(--dynamic-text-primary);
            flex-shrink: 0;
        }

        .item-name {
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            color: var(--dynamic-text-primary);
            line-height: 1.2;
        }

        .activate-pill {
            background: #4ade80;
            color: white;
            padding: 4px 8px !important;
            border-radius: 6px;
            font-size: 9px !important;
            font-weight: 800;
            border: none;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.3px;
            min-height: 0 !important;
            /* CRITICAL FIX: Blocks global 32px touch rule */
            height: 22px !important;
            /* Enforce proper pill height */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ─── SHARE BTN (FIXED) ─── */
        .share-fixed {
            position: fixed;
            bottom: 18px;
            right: 18px;
            z-index: 1000;
        }

        .share-btn {
            background: var(--btn-primary-bg);
            color: var(--dynamic-btn-text);
            padding: 10px 18px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            box-shadow: var(--dynamic-btn-glow);
            transition: all 0.2s ease;
        }

        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--dynamic-btn-glow);
            opacity: 0.9;
        }

        .share-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ─── 6-TIER LANDSCAPE SYSTEM ─── */
        @media screen and (orientation: landscape) {

            html,
            body {
                overflow: hidden !important;
                height: 100dvh !important;
                width: 100vw !important;
                max-width: 100vw !important;
            }

            .landscape-scroller {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100% !important;
                height: 100dvh !important;
                overflow: hidden !important;
                /* No scrolling on the master scroller */
                background: var(--bg-primary) !important;
                z-index: 1000 !important;
                display: flex !important;
                flex-direction: column !important;
                -webkit-overflow-scrolling: touch;
            }

            .top-nav {
                height: 44px !important;
                padding: 0 15px !important;
                position: relative !important;
                width: 100% !important;
                flex-shrink: 0 !important;
                display: flex !important;
                align-items: center !important;
                justify-content: space-between !important;
                z-index: 1010 !important;
                /* Above scrolling content */
            }

            .page-body {
                flex: 1 !important;
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                width: 100% !important;
                min-width: 0 !important;
                height: calc(100% - 44px) !important;
                padding: 10px 40px !important;
                gap: 20px !important;
                overflow-y: hidden !important;
                overflow-x: auto !important;
                /* Internal scroll only, keeps nav fixed */
            }

            .page-body::-webkit-scrollbar {
                height: 6px;
            }

            .page-body::-webkit-scrollbar-track {
                background: rgba(255, 255, 255, 0.05);
            }

            .page-body::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 10px;
            }

            .left-panel {
                width: 200px !important;
                height: 100% !important;
                justify-content: flex-start !important;
                /* Prevent vertical clipping */
                flex-shrink: 0 !important;
            }

            .right-panel {
                width: 450px !important;
                height: 100% !important;
                flex: 1 !important;
                /* Take up remaining horizontal space on ultra-wide screens */
                flex-shrink: 0 !important;
            }

            .branding-icon {
                width: 30px !important;
                height: 30px !important;
            }

            .branding-text {
                font-size: 14px !important;
                display: block !important;
            }

            .back-btn {
                width: 32px !important;
                height: 32px !important;
            }

            /* Utilities & Extra Fixes */
            .share-fixed {
                bottom: 12px !important;
                right: 25px !important;
                z-index: 1005 !important;
            }

            /* Base landscape share-btn uses default portrait (13px) */

            /* TIER 1: Ultra-compact (<320px) */
            @media (max-height: 319px) {
                .top-nav {
                    height: 36px !important;
                }

                .branding-text {
                    font-size: 11px !important;
                    display: block !important;
                }

                .page-body {
                    height: calc(100% - 36px) !important;
                    padding: 4px 8px !important;
                    gap: 8px !important;
                }

                .stat-value {
                    font-size: 14px !important;
                }

                .stat-label {
                    font-size: 7px !important;
                }

                .stat-card {
                    padding: 6px 8px !important;
                    gap: 6px !important;
                    border-radius: 8px !important;
                }

                .stats-group {
                    gap: 6px !important;
                    margin-bottom: 8px !important;
                }

                .stat-icon {
                    width: 24px !important;
                    height: 24px !important;
                }

                .stat-icon svg {
                    width: 12px !important;
                    height: 12px !important;
                }

                .subheader-msg {
                    font-size: 8px !important;
                    margin-bottom: 4px !important;
                }

                .refresh-circle {
                    width: 34px !important;
                    height: 34px !important;
                }

                .refresh-label {
                    font-size: 8px !important;
                }

                .left-panel {
                    width: 130px !important;
                    gap: 4px !important;
                }

                .right-panel {
                    min-width: 320px !important;
                }

                /* allow elastic stretch */
                .items-grid {
                    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)) !important;
                    gap: 4px !important;
                }

                .tab-btn {
                    font-size: 7.5px !important;
                    padding: 4px 0 !important;
                }

                .item-card {
                    height: 60px !important;
                    padding: 4px 4px !important;
                }

                .item-icon {
                    width: 18px !important;
                    height: 18px !important;
                }

                .share-fixed {
                    bottom: 8px !important;
                    right: 8px !important;
                }

                .share-text {
                    display: none !important;
                }

                .share-btn {
                    padding: 10px !important;
                    border-radius: 50% !important;
                    gap: 0 !important;
                }

                .share-btn svg {
                    width: 14px !important;
                    height: 14px !important;
                }
            }

            /* TIER 2: Compact (320-374px) */
            @media (min-height: 320px) and (max-height: 374px) {
                .top-nav {
                    height: 40px !important;
                }

                .branding-text {
                    font-size: 11px !important;
                    display: block !important;
                }

                /* Hide title to save horizontal space */
                .left-panel {
                    width: 155px !important;
                }

                .right-panel {
                    min-width: 350px !important;
                }

                /* allow elastic stretch */
                .page-body {
                    height: calc(100% - 40px) !important;
                    padding: 6px 10px !important;
                    gap: 10px !important;
                }

                .items-grid {
                    grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)) !important;
                    gap: 8px !important;
                    padding: 6px !important;
                }

                .tabs-row {
                    display: flex;
                    flex-shrink: 0;
                }

                .stat-value {
                    font-size: 16px !important;
                }

                .stat-label {
                    font-size: 8px !important;
                }

                .stat-card {
                    padding: 8px 10px !important;
                    gap: 8px !important;
                    border-radius: 10px !important;
                }

                .stats-group {
                    gap: 8px !important;
                    margin-bottom: 12px !important;
                }

                .stat-icon {
                    width: 28px !important;
                    height: 28px !important;
                }

                .stat-icon svg {
                    width: 14px !important;
                    height: 14px !important;
                }

                .subheader-msg {
                    font-size: 9px !important;
                    margin-bottom: 6px !important;
                }

                .refresh-circle {
                    width: 40px !important;
                    height: 40px !important;
                }

                .refresh-circle svg {
                    width: 20px !important;
                    height: 20px !important;
                }

                .refresh-label {
                    font-size: 9px !important;
                }

                .share-fixed {
                    bottom: 10px !important;
                    right: 10px !important;
                }

                .share-text {
                    display: none !important;
                }

                .share-btn {
                    padding: 12px !important;
                    border-radius: 50% !important;
                    gap: 0 !important;
                }

                .share-btn svg {
                    width: 16px !important;
                    height: 16px !important;
                }
            }

            /* TIER 3: Standard (375-449px) */
            @media (min-height: 375px) and (max-height: 449px) {
                .left-panel {
                    width: 230px !important;
                }

                .right-panel {
                    min-width: 500px !important;
                }

                .items-grid {
                    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)) !important;
                }

                .stat-value {
                    font-size: 20px !important;
                }

                .stat-label {
                    font-size: 10px !important;
                }

                .stat-card {
                    padding: 12px 14px !important;
                    gap: 12px !important;
                }

                .stat-icon {
                    width: 36px !important;
                    height: 36px !important;
                }

                .stat-icon svg {
                    width: 18px !important;
                    height: 18px !important;
                }

                .top-nav {
                    padding: 0 20px !important;
                }

                .subheader-msg {
                    font-size: 11px !important;
                    margin-bottom: 12px !important;
                }

                .refresh-circle {
                    width: 50px !important;
                    height: 50px !important;
                }

                .refresh-circle svg {
                    width: 24px !important;
                    height: 24px !important;
                }

                .refresh-label {
                    font-size: 11px !important;
                }
            }

            /* TIER 4: Large Mobile (450-499px) */
            @media (min-height: 450px) and (max-height: 499px) {
                .left-panel {
                    width: 240px !important;
                }

                .right-panel {
                    min-width: 550px !important;
                }

                .items-grid {
                    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)) !important;
                }

                .stat-value {
                    font-size: 22px !important;
                }

                .stat-label {
                    font-size: 11px !important;
                }

                .subheader-msg {
                    font-size: 12px !important;
                    margin-bottom: 15px !important;
                }

                .refresh-circle {
                    width: 54px !important;
                    height: 54px !important;
                }

                .refresh-label {
                    font-size: 12px !important;
                }

                .share-btn {
                    padding: 12px 20px !important;
                    font-size: 14px !important;
                }
            }

            /* TIER 5: Small-Tablet (500-699px) */
            @media (min-height: 500px) and (max-height: 699px) {
                .top-nav {
                    height: 60px !important;
                    padding: 0 40px !important;
                    justify-content: space-between !important;
                }

                .branding-icon {
                    width: 42px !important;
                    height: 42px !important;
                }

                .branding-text {
                    font-size: 18px !important;
                }

                .page-body {
                    height: calc(100% - 60px) !important;
                    padding: 20px 40px !important;
                    gap: 30px !important;
                }

                .left-panel {
                    width: 250px !important;
                }

                .right-panel {
                    min-width: 450px !important;
                    flex: 1 !important;
                }

                /* Fits Fold (829px) perfectly without scroll */
                .items-grid {
                    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)) !important;
                }

                .stat-value {
                    font-size: 26px !important;
                }

                .stat-label {
                    font-size: 12px !important;
                }

                .stat-card {
                    padding: 16px 20px !important;
                    gap: 16px !important;
                }

                .stat-icon {
                    width: 46px !important;
                    height: 46px !important;
                }

                .stat-icon svg {
                    width: 24px !important;
                    height: 24px !important;
                }

                .subheader-msg {
                    font-size: 14px !important;
                    margin-bottom: 20px !important;
                }

                .refresh-circle {
                    width: 62px !important;
                    height: 62px !important;
                }

                .refresh-circle svg {
                    width: 30px !important;

    <script>
        const iconMap = {
            'Java': 'code.png', 'Python': 'code.png', 'C++': 'code.png',
            'JavaScript': 'code.png', 'C': 'code.png', 'CSS': 'html.png',
            'Web Dev': 'website.png', 'App Dev': 'andriod.png',
            'Data Science': 'roadmap_new.png', 'Game Dev': 'unity.png',
            '2D Animation': '2d_animation.png', '3D Animation': '3d_animation.png',
            'Interior Design': 'interior_design1.png'
        };

        const contentData = {
            LANGUAGES: [
                { name: 'Java' }, { name: 'Python' }, { name: 'C++' },
                { name: 'JavaScript' }, { name: 'C' }, { name: 'CSS' }
            ],
            COURSE: [
                { name: 'Web Dev' }, { name: 'App Dev' },
                { name: 'Data Science' }, { name: 'Game Dev' }
            ],
            EXTRAS: [
                { name: '2D Animation' }, { name: '3D Animation' }, { name: 'Interior Design' }
            ]
        };

        function switchTab(cat) {
            document.querySelectorAll('.tab-btn').forEach(t => {
                t.classList.toggle('active', t.textContent.trim().toUpperCase() === cat);
            });
            renderItems(cat);
        }

        function renderItems(cat) {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = (contentData[cat] || []).map(item => `
                <div class="item-card">
                    <div class="item-icon-placeholder">${item.name.charAt(0)}</div>
                    <div class="item-name">${item.name}</div>
                    <button class="activate-pill">Activate</button>
                </div>
            `).join('');
        }

        document.getElementById('refresh-btn').addEventListener('click', function () {
            this.style.transition = 'transform 0.45s ease';
            this.style.transform = 'rotate(360deg)';
            setTimeout(() => {
                this.style.transition = 'none';
                this.style.transform = 'rotate(0deg)';
                setTimeout(() => { this.style.transition = 'transform 0.45s ease'; }, 50);
            }, 450);
        });

        renderItems('LANGUAGES');
    </script>
    <script src="assets/js/global-theme.js"></script>
    <script src="assets/js/theme.js"></script>
