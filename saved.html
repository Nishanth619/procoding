<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script src="assets/js/theme-critical.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Saved Screenshots - Pro Coding</title>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --folder-bg: rgba(255, 255, 255, 0.1);
            --folder-border: rgba(255, 255, 255, 0.2);
            --folder-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            background: var(--bg-primary);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--dynamic-text-primary);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--dynamic-nav-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Centered branding */
        .nav-center-brand {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            background: var(--dynamic-nav-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--dynamic-nav-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .back-btn:hover { background: var(--dynamic-nav-hover); transform: translateY(-2px); }
        .back-btn svg { width: 24px; height: 24px; fill: var(--dynamic-text-primary); }

        .branding {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .branding-icon { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .branding-text { font-size: 20px; font-weight: 700; }

        /* Gallery Content */
        .gallery-container {
            padding: 20px 30px 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .page-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Fixed 4-Column Grid */
        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .screenshot-card {
            background: var(--folder-bg);
            border: 1px solid var(--folder-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: var(--folder-shadow);
        }
        .screenshot-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.4); box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15); }

        .screenshot-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .screenshot-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .screenshot-info { padding: 15px 18px 18px; }
        .screenshot-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
        .screenshot-meta {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            font-weight: 500;
        }
        .screenshot-desc {
            font-size: 13px;
            opacity: 0.8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Comprehensive 6-Tier Landscape System for Saved Gallery (Vertical Grid) */
        @media screen and (orientation: landscape) {
            html, body {
                overflow-x: hidden !important; /* NO horizontal scroll */
                overflow-y: hidden !important; /* Body doesn't scroll; scroller handle it */
                height: 100dvh !important;
                width: 100vw !important;
                max-width: 100vw !important;
                position: fixed !important;
            }

            .landscape-scroller {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100vw !important; /* Locked to viewport width */
                max-width: 100vw !important;
                height: 100dvh !important;
                overflow-y: auto !important; /* ONLY vertical scroll */
                overflow-x: hidden !important; /* NO horizontal scroll */
                -webkit-overflow-scrolling: touch;
                display: block !important;
                z-index: 1000 !important;
                background: var(--bg-primary) !important;
            }

            .top-nav {
                height: 44px !important;
                padding: 0 15px !important;
                display: flex !important;
                align-items: center !important;
                background: var(--dynamic-nav-bg) !important;
                backdrop-filter: blur(15px) !important;
                border-bottom: 1px solid var(--dynamic-nav-border) !important;
                position: sticky !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                z-index: 1001 !important;
                /* Disable horizontal scroll in navigation bar as well */
                overflow: hidden !important;
                white-space: nowrap !important;
            }
            .top-nav::-webkit-scrollbar { display: none !important; }

            .nav-left { flex-shrink: 0 !important; display: flex !important; align-items: center !important; gap: 8px !important; }
            .branding-icon { width: 30px !important; height: 30px !important; }
            .branding-text { font-size: 13px !important; display: block !important; white-space: nowrap !important; }

            .back-btn { width: 32px !important; height: 32px !important; border-radius: 8px !important; }
            .back-btn svg { width: 18px !important; height: 18px !important; }

            /* Navigation Hide Logic for small screens */
            @media (max-width: 580px) {
                .branding-text { font-size: 11px !important; display: block !important;  }
            }

            .gallery-container {
                position: relative !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                display: block !important;
                padding: 15px 15px 40px !important;
                overflow: visible !important; /* Let body handle the scroll */
                margin: 0 !important;
            }

            .page-title {
                font-size: 18px !important;
                margin-bottom: 15px !important;
                text-align: left !important;
                display: block !important;
            }

            .screenshots-grid {
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important;
                gap: 12px !important;
                width: 100% !important;
                max-width: 100% !important;
                height: auto !important;
                margin: 0 !important;
            }

            .screenshot-card {
                width: 100% !important;
                min-height: auto !important;
                background: var(--folder-bg) !important;
                border: 1px solid var(--folder-border) !important;
                border-radius: 12px !important;
                overflow: hidden !important;
                display: flex !important;
                flex-direction: column !important;
            }

            .screenshot-thumb { aspect-ratio: 16/9 !important; }
            .screenshot-info { padding: 8px 10px !important; }
            .screenshot-title { font-size: 11px !important; margin-bottom: 2px !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .screenshot-meta { font-size: 8px !important; margin-bottom: 4px !important; gap: 6px !important; opacity: 0.6; }
            .screenshot-desc { font-size: 9px !important; -webkit-line-clamp: 1; line-clamp: 1; line-height: 1.2 !important; }

            /* TIER 1/2: Ultra-Compact Heights */
            @media (max-height: 374px) {
                .gallery-container { padding: 10px 10px 30px !important; }
                .screenshots-grid { gap: 8px !important; }
                .screenshot-card { border-radius: 10px !important; }
                .screenshot-info { padding: 6px 8px !important; }
                .screenshot-desc { display: none !important; } /* Hide desc on small screens to fit more */
            }

            /* TIER 5: Small-Tablet (500-699px) */
            @media (min-height: 500px) and (max-height: 699px) {
                .top-nav { height: 60px !important; padding: 0 25px !important; }
                .branding-icon { width: 42px !important; height: 42px !important; }
                .branding-text { font-size: 16px !important; }
                /* Removed top: 60px to allow natural flow scroll */
                .screenshots-grid { gap: 20px !important; grid-template-columns: repeat(4, 1fr) !important; }
                .screenshot-title { font-size: 14px !important; }
                .screenshot-meta { font-size: 11px !important; }
                .screenshot-desc { font-size: 12px !important; -webkit-line-clamp: 2; line-clamp: 2; }
            }

            /* TIER 6: Desktop / Large Tablet (700px+) */
            @media (min-height: 700px) {
                .top-nav { height: 70px !important; padding: 0 30px !important; }
                .branding-icon { width: 52px !important; height: 52px !important; }
                .branding-text { font-size: 20px !important; }
                /* Removed top: 70px to allow natural flow scroll */
                .gallery-container { max-width: 1400px !important; margin: 0 auto !important; position: relative !important; }
                .screenshots-grid { gap: 30px !important; grid-template-columns: repeat(4, 1fr) !important; }
                .screenshot-title { font-size: 18px !important; }
                .screenshot-meta { font-size: 14px !important; }
                .screenshot-desc { font-size: 15px !important; -webkit-line-clamp: 2; line-clamp: 2; }
            }

            /* Utilities */
            .landscape-scroller::-webkit-scrollbar { width: 6px; }
            .landscape-scroller::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
            .landscape-scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        }
    </style>

    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <div class="landscape-scroller">
        <nav class="top-nav">
            <div class="nav-left">
                <a href="javascript:history.back()" class="back-btn" title="Back">
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </a>
            </div>
            <div class="nav-center-brand">
                <div class="branding-icon">
                    <img src="assets/images/logo.png" alt="Logo">
                </div>
                <span class="branding-text">Pro coding</span>
            </div>
            <div class="nav-right"></div>
        </nav>

        <div class="gallery-container">
            <h1 class="page-title">Saved Gallery</h1>
            <div class="screenshots-grid" id="main-gallery">
                <!-- Populated via JS -->
            </div>
        </div>
    </div>

    <script src="assets/js/global-theme.js"></script>
    <script>
        const placeholderImages = [
            'assets/images/bg home sc reen.png',
            'assets/images/roadmap_new.png',
            'assets/images/homepagebg.png'
        ];

        const descriptions = [
            "Project architecture and core design patterns overview.",
            "Visual milestone: UI implementation for major features.",
            "Performance optimization logic for resource management.",
            "Conceptual sketches for the upcoming module expansion.",
            "Summary of database schema and API integration points.",
            "Testing suite results and verification logs for build v4.2."
        ];

        const categories = ["Web Dev", "Python", "Unity", "Data Science", "React", "Node.js"];

        function loadGallery() {
            const grid = document.getElementById('main-gallery');
            const now = new Date();

            grid.innerHTML = Array.from({length: 16}).map((_, i) => {
                const date = new Date(now);
                date.setDate(now.getDate() - i);
                const dateStr = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
                const timeStr = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                const category = categories[i % categories.length];
                const desc = descriptions[i % descriptions.length];

                return `
                <div class="screenshot-card">
                    <div class="screenshot-thumb">
                        <img src="${placeholderImages[i % 3]}" alt="Screenshot ${i+1}">
                    </div>
                    <div class="screenshot-info">
                        <div class="screenshot-title">${category} - Session ${i+1}</div>
                        <div class="screenshot-meta">
                            <span>${dateStr}</span>
                            <span>${timeStr}</span>
                        </div>
                        <div class="screenshot-desc">${desc}</div>
                    </div>
                </div>
            `;}).join('');
        }

    </script>
    <script src="assets/js/global-theme.js"></script>
    <script>
        window.onload = loadGallery;
    </script>
</body>
</html>
